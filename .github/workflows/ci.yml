name: Flask CI

on:
  push:
    branched:
      - main

jobs: 
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: 
          pip install -r requirements.txt

      - name: Run Tests
        run:
          pytest

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image 
        run:
          docker build -t final_learning_task .